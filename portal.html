<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Applied Behavioral Health Practice — Portal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="portal-header no-print">
  <div class="brand">
    <button class="secondary icon-btn" onclick="toggleSidebar()" title="Toggle navigation" style="background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.4);"><i class="bi bi-list"></i></button>
    <img class="brand-logo" src="https://d1yei2z3i6k35z.cloudfront.net/15694166/695009dabcbb1_LogoWhite.png" alt="Applied Behavioral Health Practice">
    <span class="brand-title">Applied Behavioral Health Practice</span>
  </div>
  <div class="who" id="whoami"></div>
  <div class="btn-row" style="margin:0;">
    <div style="position:relative;display:inline-block;">
      <button class="secondary" id="bell-btn" onclick="showSection('notifications')"
              style="padding:6px 10px;font-size:16px;line-height:1;" title="Notifications">
        <i class="bi bi-bell-fill"></i>
        <span id="bell-badge" style="display:none;position:absolute;top:-4px;right:-4px;
          background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;
          border-radius:9px;align-items:center;justify-content:center;padding:0 4px;">0</span>
      </button>
    </div>
    <button id="switchClientBtn" class="secondary" onclick="switchClient()" style="display:none;"><i class="bi bi-arrow-left-right"></i> Switch Client</button>
    <button class="secondary" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Log Out</button>
  </div>
</header>

<div class="app-shell">
  <aside class="sidebar no-print" id="sidebar">
    <button class="sidebar-link" data-section="home" onclick="showSection('home')"><i class="bi bi-house-fill"></i> Home</button>
    <button class="sidebar-link" data-section="dashboard" onclick="showSection('dashboard')" id="dashboardNavBtn" style="display:none;"><i class="bi bi-speedometer2"></i> Dashboard</button>

    <div class="sidebar-group">
      <div class="sidebar-group-title" onclick="toggleSidebarGroup(this)">Assessments<i class="bi bi-chevron-down sg-chevron"></i></div>
      <div class="sidebar-group-links">
        <button class="sidebar-link" data-section="roadmap" onclick="showSection('roadmap')" id="roadmapNavBtn"><i class="bi bi-signpost-split-fill"></i> Roadmap</button>
        <button class="sidebar-link" data-section="win" onclick="showSection('win')" id="winNavBtn"><i class="bi bi-heart-pulse-fill"></i> What I Need</button>
        <button class="sidebar-link" data-section="bfa" onclick="showSection('bfa')" id="bfaNavBtn"><i class="bi bi-clipboard2-check-fill"></i> Behavior Assessment</button>
        <button class="sidebar-link" data-section="grades" onclick="showSection('grades')"><i class="bi bi-mortarboard-fill"></i> Grades</button>
        <button class="sidebar-link" data-section="intake" onclick="showSection('intake')" id="intakeNavBtn"><i class="bi bi-clipboard2-pulse-fill"></i> Intake &amp; Validity</button>
      </div>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-title" onclick="toggleSidebarGroup(this)">Records<i class="bi bi-chevron-down sg-chevron"></i></div>
      <div class="sidebar-group-links">
        <button class="sidebar-link" data-section="plan" onclick="showSection('plan')"><i class="bi bi-flag-fill"></i> Goals &amp; Plan</button>
        <button class="sidebar-link" data-section="progress" onclick="showSection('progress')"><i class="bi bi-graph-up"></i> Progress</button>
        <button class="sidebar-link" data-section="scores" onclick="showSection('scores')"><i class="bi bi-clipboard2-data-fill"></i> Standardized Scores</button>
        <button class="sidebar-link" data-section="sessions" onclick="showSection('sessions')"><i class="bi bi-journal-text"></i> Session Notes</button>
      </div>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-title" onclick="toggleSidebarGroup(this)">Insights<i class="bi bi-chevron-down sg-chevron"></i></div>
      <div class="sidebar-group-links">
        <button class="sidebar-link" data-section="recommendation" onclick="showSection('recommendation')" id="recNavBtn"><i class="bi bi-stars"></i> Package Rec</button>
        <button class="sidebar-link" data-section="reports" onclick="showSection('reports')" id="reportsNavBtn"><i class="bi bi-file-earmark-medical-fill"></i> Assessment Report</button>
        <button class="sidebar-link" data-section="progress-report" onclick="showSection('progress-report')" id="progressReportNavBtn"><i class="bi bi-graph-up-arrow"></i> Progress Report</button>
        <button class="sidebar-link" data-section="client-program" onclick="showSection('client-program')" id="clientProgramNavBtn"><i class="bi bi-calendar2-week-fill"></i> Client Program</button>
        <button class="sidebar-link" data-section="program-admin" onclick="showSection('program-admin')" id="programAdminNavBtn"><i class="bi bi-collection-play-fill"></i> Programs</button>
        <button class="sidebar-link" data-section="appointments" onclick="showSection('appointments')"><i class="bi bi-calendar-check-fill"></i> Appointments</button>
        <button class="sidebar-link" data-section="consent-forms" onclick="showSection('consent-forms')" id="consentFormsNavBtn"><i class="bi bi-pen-fill"></i> Consent Forms</button>
        <button class="sidebar-link" data-section="discharge" onclick="showSection('discharge')" id="dischargeNavBtn" style="display:none;"><i class="bi bi-clipboard2-x-fill"></i> Discharge Summary</button>
        <button class="sidebar-link" data-section="reminders" onclick="showSection('reminders')" id="remindersNavBtn" style="display:none;"><i class="bi bi-bell-fill"></i> Reminders &amp; Messages</button>
        <button class="sidebar-link" data-section="settings" onclick="showSection('settings')" id="settingsNavBtn" style="display:none;"><i class="bi bi-gear-fill"></i> Settings</button>
        <button class="sidebar-link" data-section="notifications" onclick="showSection('notifications')" id="notificationsNavBtn" style="display:none;"><i class="bi bi-bell-fill"></i> Notifications</button>
        <button class="sidebar-link" data-section="broadcasts" onclick="showSection('broadcasts')" id="broadcastsNavBtn" style="display:none;"><i class="bi bi-megaphone-fill"></i> Broadcasts</button>
      </div>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-title" onclick="toggleSidebarGroup(this)">Billing<i class="bi bi-chevron-down sg-chevron"></i></div>
      <div class="sidebar-group-links">
        <button class="sidebar-link" data-section="superbill" onclick="showSection('superbill')" id="superbillNavBtn" style="display:none;"><i class="bi bi-receipt-cutoff"></i> Superbill</button>
        <button class="sidebar-link" data-section="client-billing" onclick="showSection('client-billing')" id="clientBillingNavBtn" style="display:none;"><i class="bi bi-receipt-cutoff"></i> My Superbills</button>
      </div>
    </div>

    <div class="sidebar-group">
      <div class="sidebar-group-title" onclick="toggleSidebarGroup(this)">My Journey<i class="bi bi-chevron-down sg-chevron"></i></div>
      <div class="sidebar-group-links">
        <button class="sidebar-link" data-section="programs" onclick="showSection('programs')" id="programsNavBtn"><i class="bi bi-play-circle-fill"></i> My Program</button>
        <button class="sidebar-link" data-section="client-viz" onclick="showSection('client-viz')" id="clientVizNavBtn"><i class="bi bi-bar-chart-fill"></i> My Progress</button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="page">
      <div id="broadcast-banner" style="display:none;padding:0 0 16px;">
      <style>
        .bcast-banner-item { display:flex;align-items:flex-start;gap:12px;
          background:linear-gradient(135deg,#fffbeb,#fef3c7);
          border:1.5px solid #fcd34d;border-radius:12px;
          padding:14px 16px;margin-bottom:8px;color:#92400e; }
        @media (prefers-color-scheme:dark) {
          .bcast-banner-item { background:linear-gradient(135deg,#3d2e00,#4a3800);border-color:#92400e;color:#fcd34d; } }
        :root[data-theme="dark"] .bcast-banner-item { background:linear-gradient(135deg,#3d2e00,#4a3800);border-color:#92400e;color:#fcd34d; }
      </style>
    </div>
    <div id="section-dashboard" class="section"></div>
      <div id="section-home" class="section"></div>
      <div id="section-roadmap" class="section"></div>
      <div id="section-win" class="section"></div>
      <div id="section-plan" class="section"></div>
      <div id="section-progress" class="section"></div>
      <div id="section-scores" class="section"></div>
      <div id="section-sessions" class="section"></div>
      <div id="section-recommendation" class="section"></div>
      <div id="section-appointments" class="section"></div>
      <div id="section-programs" class="section"></div>
      <div id="section-program-admin" class="section"></div>
      <div id="section-bfa" class="section"></div>
      <div id="section-reports" class="section"></div>
      <div id="section-progress-report" class="section"></div>
      <div id="section-client-program" class="section"></div>
      <div id="section-grades" class="section"></div>
      <div id="section-intake" class="section"></div>
      <div id="section-superbill" class="section"></div>
      <div id="section-client-billing" class="section"></div>
      <div id="section-consent-forms" class="section"></div>
      <div id="section-client-viz" class="section"></div>
      <div id="section-discharge" class="section"></div>
      <div id="section-reminders" class="section"></div>
    <div id="section-settings" class="section"></div>
    <div id="section-notifications" class="section"></div>
    <div id="section-broadcasts" class="section"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/home.js"></script>
<script src="js/roadmap.js"></script>
<script src="js/win.js"></script>
<script src="js/plan.js"></script>
<script src="js/progress.js"></script>
<script src="js/scores.js"></script>
<script src="js/sessions.js"></script>
<script src="js/recommendation.js"></script>
<script src="js/appointments.js"></script>
<script src="js/programs.js"></script>
<script src="js/program-admin.js"></script>
<script src="js/bfa.js"></script>
<script src="js/reports.js"></script>
<script src="js/progress-report.js"></script>
<script src="js/client-program.js"></script>
<script src="js/grades.js"></script>
<script src="js/intake.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/superbill.js"></script>
<script src="js/notifications.js"></script>
<script src="js/consent-forms.js"></script>
<script src="js/client-viz.js"></script>
<script src="js/discharge.js"></script>
<script src="js/reminders.js"></script>
<script src="js/settings.js"></script>
<script src="js/notifications.js"></script>
<script src="js/broadcasts.js"></script>
<script>
requireLogin();
if (isProvider() && !getClientId()) {
  window.location.href = "login.html";
}
document.getElementById("whoami").textContent = `${getClientId()} — ${getAssessorName()} (${getRole()})`;
if (isProvider()) document.getElementById("switchClientBtn").style.display = "inline-block";
const _role = getRole();
if (_role !== "provider") document.getElementById("recNavBtn").style.display = "none";
if (_role !== "provider") document.getElementById("reportsNavBtn").style.display = "none";
if (_role !== "provider") document.getElementById("progressReportNavBtn").style.display = "none";
if (_role !== "provider") document.getElementById("clientProgramNavBtn").style.display = "none";
if (_role !== "provider") document.getElementById("programAdminNavBtn").style.display = "none";
if (_role === "provider") document.getElementById("programsNavBtn").style.display = "none";
if (_role === "provider") document.getElementById("clientVizNavBtn").style.display = "none";
if (_role === "provider") document.getElementById("dashboardNavBtn").style.display = "block";
if (_role === "provider") document.getElementById("superbillNavBtn").style.display = "block";
if (_role !== "provider") document.getElementById("clientBillingNavBtn").style.display = "block";
if (_role !== "provider") document.getElementById("consentFormsNavBtn").style.display = "none";
if (_role === "provider") document.getElementById("dischargeNavBtn").style.display = "block";
if (_role === "provider") document.getElementById("remindersNavBtn").style.display = "block";
if (_role !== "provider") document.getElementById("settingsNavBtn").style.display = "block";
if (_role !== "provider") document.getElementById("notificationsNavBtn").style.display = "block";
if (_role === "provider") document.getElementById("broadcastsNavBtn").style.display = "block";
if (_role === "adult") {
  document.getElementById("roadmapNavBtn").style.display = "none";
  document.getElementById("winNavBtn").style.display = "none";
  document.getElementById("bfaNavBtn").style.display = "none";
}

loadBroadcastBanner();
if (typeof updateBellBadge === "function" && typeof getRole === "function" && getRole() !== "provider") updateBellBadge();

function switchClient() {
  setProviderClient("");
  window.location.href = "login.html";
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
}

function toggleSidebarGroup(titleEl) {
  const group = titleEl.closest(".sidebar-group");
  const key   = "sbg_" + titleEl.textContent.trim().replace(/\s+/g, "_");
  group.classList.toggle("collapsed");
  try { localStorage.setItem(key, group.classList.contains("collapsed") ? "1" : "0"); } catch (_) {}
}

// Restore collapsed state from localStorage
document.querySelectorAll(".sidebar-group-title").forEach(titleEl => {
  const key = "sbg_" + titleEl.textContent.trim().replace(/\s+/g, "_");
  try {
    if (localStorage.getItem(key) === "1") {
      titleEl.closest(".sidebar-group").classList.add("collapsed");
    }
  } catch (_) {}
});

const SECTION_INIT = {
  dashboard: initDashboardSection,
  superbill: initSuperbillSection,
  home: initHomeSection,
  roadmap: initRoadmapSection,
  win: initWinSection,
  plan: initPlanSection,
  progress: initProgressSection,
  scores: initScoresSection,
  sessions: initSessionsSection,
  recommendation: initRecommendationSection,
  appointments: initAppointmentsSection,
  programs: initProgramsSection,
  "program-admin": initProgramAdminSection,
  bfa: initBfaSection,
  reports: initReportsSection,
  "progress-report": initProgressReportSection,
  "client-program": initClientProgramSection,
  "intake": initIntakeSection,
  "grades": initGradesSection,
  "client-viz": initClientVizSection,
  "client-billing": initClientBillingSection,
  "consent-forms": initConsentFormsSection,
  "discharge": initDischargeSection,
  "reminders": initRemindersSection,
  "settings": initSettingsSection,
  "notifications": initNotificationsSection,
  "broadcasts": initBroadcastsSection
};
const initialized = {};

function showSection(name) {
  document.querySelectorAll(".section").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".sidebar-link").forEach(b => b.classList.toggle("active", b.dataset.section === name));
  document.getElementById("section-" + name).classList.add("active");
  if (!initialized[name]) {
    initialized[name] = true;
    SECTION_INIT[name](document.getElementById("section-" + name));
  }
}

showSection("home");
if (_role === "provider") checkProgressReportDue();
checkGradesAlert();
startTimeoutWatcher();
if (_role !== "provider") initNotifications();
</script>
</body>
</html>
