<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Portal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="portal-header no-print">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i> Client Portal</div>
  <div class="who" id="whoami"></div>
  <button class="secondary" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Log Out</button>
</header>

<nav class="portal-nav no-print">
  <button data-section="roadmap" onclick="showSection('roadmap')"><i class="bi bi-signpost-split-fill"></i> Roadmap Assessment</button>
  <button data-section="win" onclick="showSection('win')"><i class="bi bi-heart-pulse-fill"></i> What I Need</button>
  <button data-section="plan" onclick="showSection('plan')"><i class="bi bi-flag-fill"></i> Goals &amp; Plan</button>
  <button data-section="progress" onclick="showSection('progress')"><i class="bi bi-graph-up"></i> Progress</button>
  <button data-section="scores" onclick="showSection('scores')"><i class="bi bi-clipboard2-data-fill"></i> Standardized Scores</button>
</nav>

<div class="page">
  <div id="section-roadmap" class="section"></div>
  <div id="section-win" class="section"></div>
  <div id="section-plan" class="section"></div>
  <div id="section-progress" class="section"></div>
  <div id="section-scores" class="section"></div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script src="js/roadmap.js"></script>
<script src="js/win.js"></script>
<script src="js/plan.js"></script>
<script src="js/progress.js"></script>
<script src="js/scores.js"></script>
<script>
requireLogin();
document.getElementById("whoami").textContent = `${getClientId()} — ${getAssessorName()}`;

const SECTION_INIT = {
  roadmap: initRoadmapSection,
  win: initWinSection,
  plan: initPlanSection,
  progress: initProgressSection,
  scores: initScoresSection
};
const initialized = {};

function showSection(name) {
  document.querySelectorAll(".section").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".portal-nav button").forEach(b => b.classList.toggle("active", b.dataset.section === name));
  document.getElementById("section-" + name).classList.add("active");
  if (!initialized[name]) {
    initialized[name] = true;
    SECTION_INIT[name](document.getElementById("section-" + name));
  }
}

showSection("roadmap");
</script>
</body>
</html>
