<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Portal — Log In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page" style="max-width:480px;">
  <div class="card">
    <h1><i class="bi bi-shield-lock-fill"></i>Client Portal</h1>

    <!-- Decoy fields: absorb password-manager autofill targeting so it
         doesn't land on the real numeric PIN field below. -->
    <input type="text" name="username" autocomplete="username" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" tabindex="-1" aria-hidden="true">
    <input type="password" name="password" autocomplete="new-password" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" tabindex="-1" aria-hidden="true">

    <div class="row">
      <label>License Key</label>
      <input id="licenseKey" type="text" placeholder="Your license key">
    </div>
    <div class="row">
      <label>Client ID</label>
      <input id="clientId" type="text" placeholder="e.g. C-1042">
    </div>
    <div class="row">
      <label>5-Digit PIN</label>
      <input id="pin" class="pin" type="text" inputmode="numeric" pattern="\d*" maxlength="5" placeholder="•••••"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        data-lpignore="true" data-1p-ignore="true" data-bwignore="true">
    </div>
    <div class="row">
      <label>Your Name (assessor/parent)</label>
      <input id="assessorName" type="text" placeholder="Your name">
    </div>
    <button onclick="login()"><i class="bi bi-box-arrow-in-right"></i> Log In</button>
    <div id="status"></div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/api.js"></script>
<script>
async function login() {
  const licenseKey = document.getElementById("licenseKey").value.trim();
  const clientId = document.getElementById("clientId").value.trim();
  const pin = document.getElementById("pin").value.trim();
  const assessorName = document.getElementById("assessorName").value.trim();

  if (!licenseKey || !clientId || !pin || !assessorName) {
    setStatus("status", "Please fill in all fields.", "error");
    return;
  }
  if (!/^\d{5}$/.test(pin)) {
    setStatus("status", "PIN must be exactly 5 digits.", "error");
    return;
  }

  setStatus("status", "Verifying...", "loading");
  setCreds({ licenseKey, clientId, pin, assessorName });
  try {
    await apiCall("verifyClient", {});
    window.location.href = "portal.html";
  } catch (e) {
    clearCreds();
    setStatus("status", e.message, "error");
  }
}
document.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
</script>
</body>
</html>
